<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 220" font-family="Arial,sans-serif" font-size="13">
  <rect width="620" height="220" fill="#fafafa" rx="6"/>
  <!-- Grid lines -->
  <line x1="20" y1="44" x2="600" y2="44" stroke="#ccc" stroke-width="1"/>
  <line x1="20" y1="80" x2="600" y2="80" stroke="#eee" stroke-width="0.5"/>
  <line x1="20" y1="116" x2="600" y2="116" stroke="#eee" stroke-width="0.5"/>
  <line x1="20" y1="152" x2="600" y2="152" stroke="#eee" stroke-width="0.5"/>
  <line x1="110" y1="10" x2="110" y2="190" stroke="#ccc" stroke-width="1"/>
  <!-- Column headers -->
  <text x="65" y="32" text-anchor="middle" font-weight="bold" fill="#555">Document</text>
  <text x="165" y="32" text-anchor="middle" font-weight="bold" fill="#1565c0">patient</text>
  <text x="245" y="32" text-anchor="middle" font-weight="bold" fill="#1565c0">severe</text>
  <text x="325" y="32" text-anchor="middle" font-weight="bold" fill="#1565c0">headache</text>
  <text x="405" y="32" text-anchor="middle" font-weight="bold" fill="#1565c0">nausea</text>
  <text x="475" y="32" text-anchor="middle" font-weight="bold" fill="#1565c0">fever</text>
  <text x="545" y="32" text-anchor="middle" font-weight="bold" fill="#999">…</text>
  <!-- Row 1 -->
  <text x="65" y="68" text-anchor="middle" fill="#333">Doc 1</text>
  <text x="165" y="68" text-anchor="middle" fill="#333" font-size="14">2</text>
  <text x="245" y="68" text-anchor="middle" fill="#333" font-size="14">1</text>
  <text x="325" y="68" text-anchor="middle" fill="#333" font-size="14">3</text>
  <text x="405" y="68" text-anchor="middle" fill="#aaa" font-size="14">0</text>
  <text x="475" y="68" text-anchor="middle" fill="#333" font-size="14">1</text>
  <text x="545" y="68" text-anchor="middle" fill="#999">…</text>
  <!-- Row 2 -->
  <text x="65" y="104" text-anchor="middle" fill="#333">Doc 2</text>
  <text x="165" y="104" text-anchor="middle" fill="#333" font-size="14">1</text>
  <text x="245" y="104" text-anchor="middle" fill="#aaa" font-size="14">0</text>
  <text x="325" y="104" text-anchor="middle" fill="#aaa" font-size="14">0</text>
  <text x="405" y="104" text-anchor="middle" fill="#333" font-size="14">2</text>
  <text x="475" y="104" text-anchor="middle" fill="#aaa" font-size="14">0</text>
  <text x="545" y="104" text-anchor="middle" fill="#999">…</text>
  <!-- Row 3 -->
  <text x="65" y="140" text-anchor="middle" fill="#333">Doc 3</text>
  <text x="165" y="140" text-anchor="middle" fill="#aaa" font-size="14">0</text>
  <text x="245" y="140" text-anchor="middle" fill="#333" font-size="14">1</text>
  <text x="325" y="140" text-anchor="middle" fill="#333" font-size="14">1</text>
  <text x="405" y="140" text-anchor="middle" fill="#333" font-size="14">1</text>
  <text x="475" y="140" text-anchor="middle" fill="#333" font-size="14">3</text>
  <text x="545" y="140" text-anchor="middle" fill="#999">…</text>
  <!-- Row ... -->
  <text x="65" y="176" text-anchor="middle" fill="#999">…</text>
  <text x="165" y="176" text-anchor="middle" fill="#999">…</text>
  <text x="245" y="176" text-anchor="middle" fill="#999">…</text>
  <text x="325" y="176" text-anchor="middle" fill="#999">…</text>
  <text x="405" y="176" text-anchor="middle" fill="#999">…</text>
  <text x="475" y="176" text-anchor="middle" fill="#999">…</text>
  <text x="545" y="176" text-anchor="middle" fill="#999">…</text>
  <!-- Annotations -->
  <text x="310" y="208" text-anchor="middle" font-size="11" fill="#888" font-style="italic">Each cell = word count in that document (bag of words)</text>
