<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="Arial,sans-serif" font-size="12">
  <rect width="700" height="380" fill="#fafafa" rx="6"/>

  <!-- Intermediate lags explanation -->
  <text x="350" y="22" text-anchor="middle" font-weight="bold" font-size="13" fill="#333">What are intermediate lags?</text>
  <!-- Chain: Y(t) ← Y(t-1) ← Y(t-2) ← Y(t-3) -->
  <rect x="80" y="36" width="50" height="28" rx="5" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="105" y="55" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="bold">Y(t)</text>
  <line x1="135" y1="50" x2="175" y2="50" stroke="#999" stroke-width="1" marker-end="url(#arr)"/>
  <rect x="180" y="36" width="56" height="28" rx="5" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="208" y="55" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="bold">Y(t-1)</text>
  <line x1="240" y1="50" x2="275" y2="50" stroke="#999" stroke-width="1"/>
  <rect x="280" y="36" width="56" height="28" rx="5" fill="#fff3e0" stroke="#e65100"/>
  <text x="308" y="55" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">Y(t-2)</text>
  <line x1="340" y1="50" x2="375" y2="50" stroke="#999" stroke-width="1"/>
  <rect x="380" y="36" width="56" height="28" rx="5" fill="#fff3e0" stroke="#e65100"/>
  <text x="408" y="55" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">Y(t-3)</text>
  <!-- Labels -->
  <text x="208" y="80" text-anchor="middle" font-size="10" fill="#1565c0">direct</text>
  <text x="208" y="90" text-anchor="middle" font-size="10" fill="#1565c0">effect</text>
  <!-- Intermediate bracket -->
  <line x1="280" y1="70" x2="436" y2="70" stroke="#e65100" stroke-width="1.5"/>
  <line x1="280" y1="67" x2="280" y2="73" stroke="#e65100" stroke-width="1.5"/>
  <line x1="436" y1="67" x2="436" y2="73" stroke="#e65100" stroke-width="1.5"/>
  <text x="358" y="86" text-anchor="middle" font-size="10" fill="#e65100" font-weight="bold">intermediate lags</text>
  <!-- Explanation -->
  <text x="490" y="46" fill="#555" font-size="10">ACF at lag 3: includes Y(t-1)→Y(t-2)→Y(t-3) chain</text>
  <text x="490" y="60" fill="#555" font-size="10">PACF at lag 3: removes that chain, shows direct only</text>

  <!-- ACF panel -->
  <text x="180" y="118" text-anchor="middle" font-weight="bold" font-size="12" fill="#1565c0">ACF (includes intermediate lags)</text>
  <!-- Axes -->
  <line x1="40" y1="220" x2="340" y2="220" stroke="#999" stroke-width="1"/>
  <line x1="40" y1="130" x2="40" y2="300" stroke="#999" stroke-width="1"/>
  <text x="190" y="318" text-anchor="middle" fill="#555" font-size="10">Lag</text>
  <!-- Lag labels -->
  <text x="61" y="312" text-anchor="middle" fill="#555" font-size="9">1</text>
  <text x="86" y="312" text-anchor="middle" fill="#555" font-size="9">2</text>
  <text x="111" y="312" text-anchor="middle" fill="#555" font-size="9">3</text>
  <text x="136" y="312" text-anchor="middle" fill="#555" font-size="9">4</text>
  <text x="161" y="312" text-anchor="middle" fill="#555" font-size="9">5</text>
  <text x="186" y="312" text-anchor="middle" fill="#555" font-size="9">6</text>
  <text x="211" y="312" text-anchor="middle" fill="#555" font-size="9">7</text>
  <text x="236" y="312" text-anchor="middle" fill="#555" font-size="9">8</text>
  <text x="261" y="312" text-anchor="middle" fill="#555" font-size="9">9</text>
  <text x="286" y="312" text-anchor="middle" fill="#555" font-size="9">10</text>
  <!-- Confidence band -->
  <rect x="40" y="200" width="300" height="40" fill="#e3f2fd" opacity="0.5"/>
  <text x="345" y="224" fill="#90caf9" font-size="9">95% CI</text>
  <!-- ACF bars (slowly decaying) -->
  <rect x="55" y="148" width="12" height="72" fill="#1565c0"/>
  <rect x="80" y="158" width="12" height="62" fill="#e65100" opacity="0.7"/>
  <rect x="105" y="165" width="12" height="55" fill="#e65100" opacity="0.7"/>
  <rect x="130" y="172" width="12" height="48" fill="#e65100" opacity="0.7"/>
  <rect x="155" y="178" width="12" height="42" fill="#e65100" opacity="0.7"/>
  <rect x="180" y="184" width="12" height="36" fill="#e65100" opacity="0.7"/>
  <rect x="205" y="190" width="12" height="30" fill="#e65100" opacity="0.7"/>
  <rect x="230" y="195" width="12" height="25" fill="#e65100" opacity="0.7"/>
  <rect x="255" y="200" width="12" height="20" fill="#e65100" opacity="0.5"/>
  <rect x="280" y="205" width="12" height="15" fill="#e65100" opacity="0.5"/>
  <!-- Legend -->
  <rect x="55" y="325" width="10" height="10" fill="#1565c0"/>
  <text x="70" y="335" fill="#555" font-size="9">Direct</text>
  <rect x="110" y="325" width="10" height="10" fill="#e65100" opacity="0.7"/>
  <text x="125" y="335" fill="#555" font-size="9">Includes indirect (via intermediate lags)</text>
  <!-- Annotation -->
  <text x="190" y="355" text-anchor="middle" fill="#e65100" font-size="10" font-style="italic">Slowly decaying → non-stationary (needs differencing, d=1)</text>

  <!-- PACF panel -->
  <text x="530" y="118" text-anchor="middle" font-weight="bold" font-size="12" fill="#2e7d32">PACF (removes intermediate lags)</text>
  <!-- Axes -->
  <line x1="390" y1="220" x2="670" y2="220" stroke="#999" stroke-width="1"/>
  <line x1="390" y1="130" x2="390" y2="300" stroke="#999" stroke-width="1"/>
  <text x="530" y="318" text-anchor="middle" fill="#555" font-size="10">Lag</text>
  <!-- Lag labels -->
  <text x="411" y="312" text-anchor="middle" fill="#555" font-size="9">1</text>
  <text x="436" y="312" text-anchor="middle" fill="#555" font-size="9">2</text>
  <text x="461" y="312" text-anchor="middle" fill="#555" font-size="9">3</text>
  <text x="486" y="312" text-anchor="middle" fill="#555" font-size="9">4</text>
  <text x="511" y="312" text-anchor="middle" fill="#555" font-size="9">5</text>
  <text x="536" y="312" text-anchor="middle" fill="#555" font-size="9">6</text>
  <text x="561" y="312" text-anchor="middle" fill="#555" font-size="9">7</text>
  <text x="586" y="312" text-anchor="middle" fill="#555" font-size="9">8</text>
  <text x="611" y="312" text-anchor="middle" fill="#555" font-size="9">9</text>
  <text x="636" y="312" text-anchor="middle" fill="#555" font-size="9">10</text>
  <!-- Confidence band -->
  <rect x="390" y="200" width="280" height="40" fill="#e8f5e9" opacity="0.5"/>
  <text x="675" y="224" fill="#a5d6a7" font-size="9">95% CI</text>
  <!-- PACF bars (cuts off after lag 1) -->
  <rect x="405" y="150" width="12" height="70" fill="#2e7d32"/>
  <rect x="430" y="212" width="12" height="8" fill="#c8e6c9"/>
  <rect x="455" y="215" width="12" height="5" fill="#c8e6c9"/>
  <rect x="480" y="217" width="12" height="3" fill="#c8e6c9"/>
  <rect x="505" y="216" width="12" height="4" fill="#c8e6c9"/>
  <rect x="530" y="218" width="12" height="2" fill="#c8e6c9"/>
  <rect x="555" y="217" width="12" height="3" fill="#c8e6c9"/>
  <rect x="580" y="218" width="12" height="2" fill="#c8e6c9"/>
  <rect x="605" y="219" width="12" height="1" fill="#c8e6c9"/>
  <rect x="630" y="217" width="12" height="3" fill="#c8e6c9"/>
  <!-- Cutoff annotation -->
  <line x1="423" y1="138" x2="423" y2="145" stroke="#d32f2f" stroke-width="1.5"/>
  <line x1="423" y1="138" x2="445" y2="138" stroke="#d32f2f" stroke-width="1.5"/>
  <text x="450" y="142" fill="#d32f2f" font-size="10" font-weight="bold">Cutoff at lag 1 → p = 1</text>
  <!-- Annotation -->
  <text x="530" y="355" text-anchor="middle" fill="#2e7d32" font-size="10" font-style="italic">Sharp cutoff → direct effect only at lag 1</text>
</svg>
