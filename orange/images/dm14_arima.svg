<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="Arial,sans-serif" font-size="12">
  <rect width="700" height="300" fill="#fafafa" rx="6"/>

  <!-- Title -->
  <text x="350" y="25" text-anchor="middle" font-weight="bold" font-size="14" fill="#333">ARIMA(p, d, q)</text>

  <!-- Three boxes for p, d, q -->
  <!-- p box -->
  <rect x="40" y="50" width="190" height="120" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="135" y="72" text-anchor="middle" font-weight="bold" font-size="13" fill="#1565c0">p = AR order</text>
  <text x="135" y="92" text-anchor="middle" fill="#333" font-size="11">How many past values</text>
  <text x="135" y="106" text-anchor="middle" fill="#333" font-size="11">predict the current value</text>
  <line x1="60" y1="116" x2="210" y2="116" stroke="#1565c0" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="135" y="134" text-anchor="middle" fill="#555" font-size="10">Guided by PACF cutoff</text>
  <text x="135" y="150" text-anchor="middle" fill="#555" font-size="10">Y(t) = β₁·Y(t-1) + β₂·Y(t-2) + ...</text>
  <text x="135" y="162" text-anchor="middle" fill="#1565c0" font-size="10" font-weight="bold">p=1 → use 1 past value</text>

  <!-- d box -->
  <rect x="255" y="50" width="190" height="120" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="350" y="72" text-anchor="middle" font-weight="bold" font-size="13" fill="#e65100">d = Differencing</text>
  <text x="350" y="92" text-anchor="middle" fill="#333" font-size="11">How many times to subtract</text>
  <text x="350" y="106" text-anchor="middle" fill="#333" font-size="11">consecutive values (remove trend)</text>
  <line x1="275" y1="116" x2="425" y2="116" stroke="#e65100" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="350" y="134" text-anchor="middle" fill="#555" font-size="10">Guided by ACF decay</text>
  <text x="350" y="150" text-anchor="middle" fill="#555" font-size="10">Y'(t) = Y(t) - Y(t-1)</text>
  <text x="350" y="162" text-anchor="middle" fill="#e65100" font-size="10" font-weight="bold">d=0 → stationary, d=1 → trending</text>

  <!-- q box -->
  <rect x="470" y="50" width="190" height="120" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="565" y="72" text-anchor="middle" font-weight="bold" font-size="13" fill="#2e7d32">q = MA order</text>
  <text x="565" y="92" text-anchor="middle" fill="#333" font-size="11">How many past forecast</text>
  <text x="565" y="106" text-anchor="middle" fill="#333" font-size="11">errors predict current value</text>
  <line x1="490" y1="116" x2="640" y2="116" stroke="#2e7d32" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="565" y="134" text-anchor="middle" fill="#555" font-size="10">Guided by ACF cutoff</text>
  <text x="565" y="150" text-anchor="middle" fill="#555" font-size="10">after differencing</text>
  <text x="565" y="162" text-anchor="middle" fill="#2e7d32" font-size="10" font-weight="bold">q=0 → no error correction</text>

  <!-- Example -->
  <rect x="100" y="195" width="500" height="85" rx="8" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="350" y="218" text-anchor="middle" font-weight="bold" font-size="13" fill="#333">Example: ARIMA(1, 1, 0)</text>
  <text x="350" y="240" text-anchor="middle" fill="#555" font-size="11">p=1: use 1 past value | d=1: difference once (remove trend) | q=0: no error correction</text>
  <text x="350" y="262" text-anchor="middle" fill="#555" font-size="11" font-style="italic">"Predict the next value from the previous change in value"</text>
</svg>
