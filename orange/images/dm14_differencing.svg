<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" font-family="Arial,sans-serif" font-size="12">
  <rect width="700" height="260" fill="#fafafa" rx="6"/>

  <!-- Title -->
  <text x="350" y="22" text-anchor="middle" font-weight="bold" font-size="14" fill="#333">Differencing (d = 1): Y'(t) = Y(t) − Y(t−1)</text>

  <!-- Original series (left) -->
  <text x="175" y="48" text-anchor="middle" font-weight="bold" font-size="12" fill="#1565c0">Original (trending)</text>
  <line x1="30" y1="190" x2="320" y2="190" stroke="#999" stroke-width="1"/>
  <line x1="30" y1="60" x2="30" y2="190" stroke="#999" stroke-width="1"/>
  <!-- Trending line with oscillation -->
  <polyline points="40,175 70,165 100,150 130,155 160,135 190,120 220,125 250,105 280,90 310,80"
            stroke="#1565c0" stroke-width="2" fill="none"/>
  <!-- Dots with values -->
  <circle cx="40" cy="175" r="3" fill="#1565c0"/>
  <circle cx="70" cy="165" r="3" fill="#1565c0"/>
  <circle cx="100" cy="150" r="3" fill="#1565c0"/>
  <circle cx="130" cy="155" r="3" fill="#1565c0"/>
  <circle cx="160" cy="135" r="3" fill="#1565c0"/>
  <circle cx="190" cy="120" r="3" fill="#1565c0"/>
  <circle cx="220" cy="125" r="3" fill="#1565c0"/>
  <circle cx="250" cy="105" r="3" fill="#1565c0"/>
  <circle cx="280" cy="90" r="3" fill="#1565c0"/>
  <circle cx="310" cy="80" r="3" fill="#1565c0"/>
  <!-- Values -->
  <text x="40" y="200" text-anchor="middle" font-size="9" fill="#555">112</text>
  <text x="70" y="200" text-anchor="middle" font-size="9" fill="#555">118</text>
  <text x="100" y="200" text-anchor="middle" font-size="9" fill="#555">132</text>
  <text x="130" y="200" text-anchor="middle" font-size="9" fill="#555">129</text>
  <text x="160" y="200" text-anchor="middle" font-size="9" fill="#555">121</text>
  <text x="190" y="200" text-anchor="middle" font-size="9" fill="#555">135</text>
  <text x="220" y="200" text-anchor="middle" font-size="9" fill="#555">148</text>
  <text x="250" y="200" text-anchor="middle" font-size="9" fill="#555">148</text>
  <text x="280" y="200" text-anchor="middle" font-size="9" fill="#555">136</text>
  <text x="310" y="200" text-anchor="middle" font-size="9" fill="#555">119</text>
  <!-- Trend arrow -->
  <line x1="50" y1="170" x2="300" y2="85" stroke="#1565c0" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="175" y="220" text-anchor="middle" font-size="10" fill="#e65100" font-style="italic">Non-stationary: mean increases over time</text>

  <!-- Arrow between -->
  <text x="350" y="130" text-anchor="middle" font-size="20" fill="#888">→</text>
  <text x="350" y="148" text-anchor="middle" font-size="10" fill="#888">subtract</text>
  <text x="350" y="160" text-anchor="middle" font-size="10" fill="#888">consecutive</text>

  <!-- Differenced series (right) -->
  <text x="530" y="48" text-anchor="middle" font-weight="bold" font-size="12" fill="#2e7d32">Differenced (stationary)</text>
  <line x1="385" y1="190" x2="670" y2="190" stroke="#999" stroke-width="1"/>
  <line x1="385" y1="60" x2="385" y2="190" stroke="#999" stroke-width="1"/>
  <!-- Zero line -->
  <line x1="385" y1="125" x2="670" y2="125" stroke="#ccc" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="675" y="128" font-size="9" fill="#ccc">0</text>
  <!-- Differenced values: 6, 14, -3, -8, 14, 13, 0, -12, -17 -->
  <polyline points="420,117 450,101 480,128 510,135 540,101 570,99 600,125 630,137 660,142"
            stroke="#2e7d32" stroke-width="2" fill="none"/>
  <circle cx="420" cy="117" r="3" fill="#2e7d32"/>
  <circle cx="450" cy="101" r="3" fill="#2e7d32"/>
  <circle cx="480" cy="128" r="3" fill="#2e7d32"/>
  <circle cx="510" cy="135" r="3" fill="#2e7d32"/>
  <circle cx="540" cy="101" r="3" fill="#2e7d32"/>
  <circle cx="570" cy="99" r="3" fill="#2e7d32"/>
  <circle cx="600" cy="125" r="3" fill="#2e7d32"/>
  <circle cx="630" cy="137" r="3" fill="#2e7d32"/>
  <circle cx="660" cy="142" r="3" fill="#2e7d32"/>
  <!-- Values -->
  <text x="420" y="200" text-anchor="middle" font-size="9" fill="#555">+6</text>
  <text x="450" y="200" text-anchor="middle" font-size="9" fill="#555">+14</text>
  <text x="480" y="200" text-anchor="middle" font-size="9" fill="#555">−3</text>
  <text x="510" y="200" text-anchor="middle" font-size="9" fill="#555">−8</text>
  <text x="540" y="200" text-anchor="middle" font-size="9" fill="#555">+14</text>
  <text x="570" y="200" text-anchor="middle" font-size="9" fill="#555">+13</text>
  <text x="600" y="200" text-anchor="middle" font-size="9" fill="#555">0</text>
  <text x="630" y="200" text-anchor="middle" font-size="9" fill="#555">−12</text>
  <text x="660" y="200" text-anchor="middle" font-size="9" fill="#555">−17</text>
  <text x="530" y="220" text-anchor="middle" font-size="10" fill="#2e7d32" font-style="italic">Stationary: fluctuates around 0, no trend</text>

  <!-- Calculation example -->
  <rect x="120" y="235" width="460" height="20" rx="4" fill="#fff" stroke="#ccc"/>
  <text x="350" y="250" text-anchor="middle" font-size="10" fill="#555">118 − 112 = +6 | 132 − 118 = +14 | 129 − 132 = −3 | ...</text>
</svg>
